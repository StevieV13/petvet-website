  <circle cx="280" cy="344" r="8.5" fill="#0F6E56"/>
  <text x="280" y="348" text-anchor="middle" font-size="8" fill="#9FE1CB" font-family="sans-serif" font-weight="bold">PV</text>


  <!-- Ghost paw print (bottom-left) -->
  <g fill="#9FE1CB" opacity="0.08" transform="translate(38,452)">
    <ellipse cx="0" cy="8" rx="8" ry="6" transform="rotate(-15,0,8)"/>
    <circle cx="-10" cy="0" r="4.5"/>
    <circle cx="10" cy="0" r="4.5"/>
    <circle cx="-15" cy="8" r="3.5"/>
    <circle cx="15" cy="8" r="3.5"/>
  </g>

  <!-- Brand footer strip -->
  <rect x="0" y="488" width="400" height="12" fill="rgba(8,80,65,0.65)"/>
  <text x="200" y="498" text-anchor="middle" font-size="8.5" fill="#9FE1CB"
