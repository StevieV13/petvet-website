  <ellipse cx="305" cy="258" rx="16" ry="15" fill="white"/>
  <!-- Iris -->
  <circle cx="257" cy="259" r="11" fill="#462406"/>
  <circle cx="307" cy="259" r="11" fill="#462406"/>
  <!-- Pupil -->
  <circle cx="257" cy="260" r="6.5" fill="#060200"/>
  <circle cx="307" cy="260" r="6.5" fill="#060200"/>
  <!-- Glint -->
