  <path d="M238,328 Q280,342 322,328 Q318,346 280,348 Q242,346 238,328Z" fill="#085041"/>
  <path d="M240,330 Q280,341 320,330" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.55"/>
  <!-- Collar tag -->
