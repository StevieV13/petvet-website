  <ellipse cx="252" cy="254" rx="15" ry="12" fill="#B07030" transform="rotate(25,252,254)"/>
  <path d="M244,249 Q248,244 255,246" fill="none" stroke="#955A25" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M243,255 Q247,250 254,252" fill="none" stroke="#955A25" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

